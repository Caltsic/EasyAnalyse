name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - agent
      - "release/**"
      - "feat/**"
      - "fix/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  desktop:
    name: Desktop typecheck, lint, test, build
    runs-on: windows-latest
    defaults:
      run:
        working-directory: easyanalyse-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: easyanalyse-desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install icon generation dependencies
        run: python -m pip install --upgrade pip pillow

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  rust-core:
    name: Rust core tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test easyanalyse-core
        run: cargo test --manifest-path easyanalyse-desktop/src-tauri/crates/easyanalyse-core/Cargo.toml
